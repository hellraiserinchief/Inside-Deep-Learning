# Phase 3 — Jupyter Server + VPN access blueprint
#
# Access model (chosen because this cluster has NO Ingress controller — see report):
#   VPN users sit on the 10.20.30.0/24 network and can reach every node's primary
#   IP and the MetalLB pool (10.20.30.65-70). Two supported exposure paths:
#     A) NodePort (default below)  -> http://<any-node-10.20.30-ip>:30888
#     B) MetalLB LoadBalancer      -> dedicated 10.20.30.6x IP (uncomment Service B)
#   Token auth (Secret below) is what protects the server across the VPN barrier.
#
# Apply:   kubectl apply -f 07-jupyter-server.yaml
# Token:   kubectl -n cluster-validation get secret jupyter-token -o jsonpath='{.data.token}' | base64 -d; echo
# Access:  open http://<node-ip>:30888/?token=<token>  from a VPN-connected machine
# Verify:  curl -sS -o /dev/null -w '%{http_code}\n' "http://<node-ip>:30888/login"   # expect 200
#          curl -sS -o /dev/null -w '%{http_code}\n' "http://<node-ip>:30888/api"     # 403 w/o token, 200 with ?token=
# Cleanup: kubectl delete -f 07-jupyter-server.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: jupyter-token
  namespace: kt
type: Opaque
stringData:
  token: "changeme-please-rotate-this-token"   # CHANGE + rotate before real use
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jupyter-config
  namespace: kt 
data:
  jupyter_server_config.py: |
    c.ServerApp.ip = '0.0.0.0'
    c.ServerApp.port = 8888
    c.ServerApp.open_browser = False
    c.ServerApp.allow_root = True
    c.ServerApp.root_dir = '/home/jovyan/work'
    import os
    c.ServerApp.token = os.environ.get('JUPYTER_TOKEN', '')
    c.ServerApp.password = ''
    c.ServerApp.allow_origin = '*'
    c.ServerApp.trust_xheaders = True
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: kt
  labels: {app: jupyter}
spec:
  replicas: 1
  selector:
    matchLabels: {app: jupyter}
  template:
    metadata:
      labels: {app: jupyter}
    spec:
      # For a GPU notebook (needs the device plugin) uncomment both lines:
      nodeSelector: {kubernetes.io/hostname: cn4.texmin.local}
      runtimeClassName: nvidia
      containers:
        - name: jupyter
          image: quay.io/jupyter/base-notebook:latest   # swap for a CUDA image for GPU work
          ports: [{containerPort: 8888}]
          env:
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef: {name: jupyter-token, key: token}
            - name: GRANT_SUDO
              value: "yes"
            - name: NB_UID
              value: "1022"
            - name: NB_GID
              value: "1023"
            - name: CHOWN_HOME
              value: "yes"  
          securityContext:
            runAsUser: 0  
          volumeMounts:
            - {name: config, mountPath: /etc/jupyter/jupyter_server_config.py, subPath: jupyter_server_config.py}
            - {name: work, mountPath: /home/jovyan/work}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits:   {cpu: "8", memory: 64Gi, nvidia.com/gpu: 1}
            # GPU notebook: add  nvidia.com/gpu: 1  under limits
          readinessProbe:
            httpGet: {path: /login, port: 8888}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap: {name: jupyter-config}
        - name: work
          hostPath: {path: /home/dmadmin/code, type: DirectoryOrCreate}
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: kt
spec:
  type: NodePort
  selector: {app: jupyter}
  ports:
    - {name: http, port: 80, targetPort: 8888, nodePort: 30888}
    
# Service B — MetalLB LoadBalancer (alternative; gives a dedicated 10.20.30.6x IP).
# Uncomment and delete Service A above if you prefer a stable IP over a node port.
